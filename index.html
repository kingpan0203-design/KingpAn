<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>土亭秘訣｜文武閣</title>
<style>
:root{--ink:#251c15;--red:#8f2b22;--paper:#ead9b7;--gold:#ad7b37}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Noto Serif TC","Songti SC","STSong",serif;color:var(--ink)}body{background:#15100d}.page{display:none;min-height:100vh}.page.active{display:flex}.home{position:relative;align-items:flex-end;justify-content:center;padding:42px 20px;background:radial-gradient(circle at 50% 24%,rgba(255,238,190,.28),transparent 28%),linear-gradient(to bottom,rgba(15,11,8,.05),rgba(15,11,8,.5)),linear-gradient(145deg,#746348 0 25%,#b9aa87 25% 36%,#75634c 36% 43%,#c6b99b 43% 54%,#6a5a47 54% 64%,#c4b390 64% 74%,#554738 74%);overflow:hidden}.home:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(95deg,transparent 0 12px,rgba(255,255,255,.025) 13px,transparent 15px),radial-gradient(ellipse at 15% 22%,rgba(26,20,15,.68),transparent 26%),radial-gradient(ellipse at 82% 34%,rgba(36,29,22,.64),transparent 28%);mix-blend-mode:multiply}.brand{position:absolute;top:8vh;left:50%;transform:translateX(-50%);text-align:center;color:#2b2017;text-shadow:0 1px #e6d3ad}.brand h1{margin:0;font-size:clamp(46px,13vw,78px);letter-spacing:.25em;white-space:nowrap}.brand p{margin:13px 0 0;letter-spacing:.55em;font-size:13px}.home-panel{position:relative;width:min(430px,100%);padding:20px;background:rgba(21,15,11,.78);border:1px solid rgba(232,201,146,.5);box-shadow:0 16px 50px rgba(0,0,0,.4)}button{font:inherit;cursor:pointer}.draw{width:100%;padding:16px;border:1px solid #d8b777;background:linear-gradient(#d8b679,#a97735);color:#24170e;font-size:19px;font-weight:700;letter-spacing:.42em}.sub{margin-top:12px;text-align:center;color:#cbb791;font-size:12px;letter-spacing:.18em}.result{position:relative;align-items:center;justify-content:center;padding:22px;background:linear-gradient(rgba(245,231,196,.72),rgba(226,207,164,.82)),radial-gradient(circle at 12% 18%,#8b765b 0 4%,transparent 18%),radial-gradient(circle at 88% 78%,#6c5a46 0 6%,transparent 22%),linear-gradient(135deg,#b7a17c,#e0cfaa 48%,#947d5e);overflow:hidden}.result:before,.result:after{content:"";position:absolute;width:34vw;height:90vh;top:5vh;opacity:.28;background:repeating-radial-gradient(ellipse at center,#35281e 0 2px,transparent 3px 15px)}.result:before{left:-13vw;transform:rotate(-14deg)}.result:after{right:-13vw;transform:rotate(16deg)}.scroll{position:relative;width:min(620px,94vw);min-height:min(830px,91vh);padding:54px 36px 74px;background:linear-gradient(90deg,rgba(101,74,43,.11),transparent 12%,transparent 88%,rgba(101,74,43,.11)),repeating-linear-gradient(0deg,rgba(92,66,38,.025) 0 1px,transparent 1px 5px),#efe0be;border:1px solid rgba(83,55,31,.52);box-shadow:0 18px 60px rgba(42,28,18,.32),inset 0 0 45px rgba(108,77,39,.13);text-align:center}.seal{display:inline-grid;place-items:center;width:58px;height:58px;border:3px double var(--red);color:var(--red);font-weight:800;font-size:13px;line-height:1.05;transform:rotate(-3deg);margin-bottom:16px}.no{font-size:15px;letter-spacing:.28em;color:#6c5441}.title{margin:15px auto 8px;font-size:clamp(25px,6vw,38px);font-weight:800;line-height:1.35}.omen{display:inline-block;margin:4px auto 24px;padding:5px 12px;border-top:1px solid rgba(122,44,33,.45);border-bottom:1px solid rgba(122,44,33,.45);color:var(--red);font-size:14px}.poem{display:grid;grid-template-columns:repeat(3,max-content);justify-content:center;gap:2px 18px;margin:8px auto 28px;font-size:clamp(18px,4.8vw,23px);font-weight:800;line-height:1.08;letter-spacing:-.02em}.poem span{white-space:nowrap;padding:2px 0}.actions{display:flex;justify-content:center;gap:12px;margin-top:26px}.actions button{border:1px solid rgba(102,51,31,.52);background:rgba(245,226,187,.58);padding:10px 15px;color:#5e2d20}.detail{background:var(--red)!important;color:#f4dfb6!important;border-color:#7b211a!important}.back{position:absolute;top:18px;left:18px;border:0;background:rgba(242,224,189,.72);padding:8px 12px;color:#4e3524}.details{align-items:flex-start;justify-content:center;padding:24px;background:#d8c49d}.article{width:min(760px,100%);background:#f1e4c7;padding:30px 28px 60px;border:1px solid #937653;box-shadow:0 14px 50px rgba(49,34,20,.24)}.article h2{text-align:center;font-size:30px;margin:8px 0 25px}.article h3{margin:27px 0 8px;color:var(--red);font-size:19px;border-bottom:1px solid rgba(120,69,40,.26);padding-bottom:8px}.article p{line-height:1.9;margin:8px 0;color:#44372d}.topbtn{position:sticky;top:12px;float:right;border:1px solid #9d7a50;background:#ead5ad;padding:8px 12px}@media(max-width:430px){.scroll{padding:42px 18px 64px;min-height:88vh}.poem{gap:1px 9px;font-size:17px}.brand h1{letter-spacing:.16em}.home{padding-bottom:25px}}
</style>
</head>
<body>
<section id="home" class="page home active"><div class="brand"><h1>土亭秘訣</h1><p>文武閣・古法籤書</p></div><div class="home-panel"><button class="draw" onclick="drawSign()">誠心起籤</button><div class="sub">靜心一念・隨機抽取</div></div></section>
<section id="result" class="page result"><button class="back" onclick="show('home')">返回</button><div class="scroll"><div class="seal">文武<br>閣</div><div class="no" id="num"></div><div class="title" id="title"></div><div class="omen" id="omen"></div><div class="poem" id="poem"></div><div class="actions"><button onclick="drawSign()">再起一籤</button><button class="detail" onclick="showDetail()">詳細分析</button></div></div></section>
<section id="details" class="page details"><article class="article"><button class="topbtn" onclick="show('result')">返回籤文</button><h2 id="dtitle"></h2><div id="detailBody"></div></article></section>
<script>
const signs=[
{id:111,title:'東風解凍，枯木逢春',omen:'否極泰來，漸入佳境之意',poem:['東風解凍','枯木逢春','雲開見日','雨過天晴','守得花開','自有光明'],meaning:'局勢由滯轉通，舊事可重新整理。眼前不宜躁進，先把根基扶正，時機一到便能自然開展。'},
{id:231,title:'明月當空，萬里無雲',omen:'心明事順，貴人相扶之意',poem:['明月當空','萬里無雲','一心坦蕩','百事通明','貴人指路','前程可行'],meaning:'此籤重在清醒與坦蕩。事情只要資訊透明、方向清楚，便能少走彎路，也容易得到可靠之人協助。'},
{id:331,title:'陽翟大賈，手弄千金',omen:'在家心亂，出他心閒之意',poem:['陽翟大賈','手弄千金','小草逢春','蓮花秋開','旱苗逢雨','豈非生光'],meaning:'財與機會在流動中產生。困守原地容易心煩，主動接觸外界、轉換環境或開展合作，反而能打開局面。'},
{id:452,title:'舟行順水，風送千帆',omen:'順勢而為，事半功倍之意',poem:['舟行順水','風送千帆','良機既至','莫再遲延','把握當下','可到彼岸'],meaning:'目前大勢偏向有利，不必過度懷疑。確定方向後宜果斷執行，但仍需留意細節與承諾，避免好局因疏忽而折損。'},
{id:576,title:'高山流水，知音相逢',omen:'人和事成，合作有益之意',poem:['高山流水','知音相逢','同心共濟','路自亨通','真誠相待','福在其中'],meaning:'此籤強調人和。單打獨鬥不如找到價值觀相近的人，合作時先談清責任與利益，關係才能長久。'},
{id:863,title:'日出扶桑，萬象更新',omen:'舊局已盡，新運初開之意',poem:['日出扶桑','萬象更新','舊塵洗盡','新路將成','守正行穩','福祿自生'],meaning:'一個階段正在結束，新的方向逐漸成形。先放下無效消耗，再把精力放到真正重要的事上，運勢會越走越清晰。'}];
let current=signs[2];function show(id){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');scrollTo(0,0)}function drawSign(){current=signs[Math.floor(Math.random()*signs.length)];document.getElementById('num').textContent='第 '+current.id+' 籤';document.getElementById('title').textContent=current.title;document.getElementById('omen').textContent=current.omen;document.getElementById('poem').innerHTML=current.poem.map(x=>'<span>'+x+'</span>').join('');show('result')}function showDetail(){document.getElementById('dtitle').textContent='第 '+current.id+' 籤｜'+current.title;document.getElementById('detailBody').innerHTML='<h3>詩詞翻譯</h3><p>'+current.meaning+'</p><h3>深層寓意</h3><p>此籤提醒：外在局勢只是條件，真正的轉機仍來自清楚判斷、合宜行動與耐心累積。避免只靠一時情緒作決定。</p><h3>運勢分析</h3><p><b>事業：</b>先理順方向與合作關係，再集中力量推進。</p><p><b>財運：</b>宜穩健流動，不宜衝動下注或貪快。</p><p><b>感情：</b>坦白溝通比反覆猜測更重要。</p><p><b>陽宅風水：</b>保持入口、主要活動區域明亮整潔，減少壓迫與雜亂。</p><p><b>身體：</b>留意睡眠與壓力，規律作息勝過短期透支。</p><h3>總結</h3><p>'+current.meaning+'</p>';show('details')}</script>
</body></html>
